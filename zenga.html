<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZENGA — Multiplayer Tower Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #15171f; --panel: rgba(28,31,42,0.92); --line: rgba(255,255,255,0.12);
    --accent: #e0a93d; --text: #f2f3f7; --muted: #9aa0b0;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg);
    font-family: "Poppins", system-ui, sans-serif; color: var(--text); }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- Lobby / overlay ---- */
  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex; align-items: center;
    justify-content: center; background: radial-gradient(circle at 50% 30%, #232838, #0d0f15);
  }
  .card {
    width: min(440px, 92vw); background: var(--panel); border: 1px solid var(--line);
    border-radius: 18px; padding: 30px 28px; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
  }
  .card h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: 2px; text-align: center; }
  .card h1 span { color: var(--accent); }
  .card .tag { text-align: center; color: var(--muted); font-size: 0.85rem; margin: 4px 0 22px; }
  .row { display: flex; gap: 10px; margin-bottom: 12px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: rgba(0,0,0,0.35); color: var(--text); font-size: 0.95rem; font-family: inherit;
  }
  input:focus { outline: 2px solid var(--accent); }
  button {
    cursor: pointer; border: none; border-radius: 10px; padding: 12px 16px; font-size: 0.95rem;
    font-weight: 600; font-family: inherit; color: #16181f; background: var(--accent);
    transition: transform 0.08s ease, filter 0.15s ease; white-space: nowrap;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: translateY(1px); }
  button.ghost { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--line); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .hint { font-size: 0.78rem; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }
  .divider { text-align: center; color: var(--muted); font-size: 0.75rem; margin: 16px 0; position: relative; }
  .divider::before, .divider::after {
    content: ""; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--line); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .share { display: none; margin-top: 6px; }
  .share label { font-size: 0.72rem; color: var(--muted); }
  .err { color: #ff7a7a; font-size: 0.8rem; text-align: center; min-height: 1.1em; margin-top: 6px; }

  /* ---- In-game HUD ---- */
  #hud { position: fixed; top: 14px; left: 14px; z-index: 10; display: none; }
  #scoreboard {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; min-width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  #scoreboard h3 { font-size: 0.72rem; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .pl { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.9rem; }
  .pl .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .pl .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pl .sc { color: var(--muted); font-variant-numeric: tabular-nums; }
  .pl.turn { background: rgba(224,169,61,0.16); border-radius: 8px; margin: 0 -6px; padding: 4px 6px; }
  .pl.turn .nm { font-weight: 600; }

  #pip {
    position: fixed; top: 14px; right: 14px; z-index: 10; width: 210px; height: 210px;
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; display: none;
    background: #0d0f15; box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  #pip canvas { display: block; }
  #pip .piplabel {
    position: absolute; top: 6px; left: 9px; z-index: 1; pointer-events: none;
    font-size: 0.62rem; letter-spacing: 1.5px; color: var(--muted);
  }
  /* center reticle to show the drop point */
  #pip::before, #pip::after {
    content: ""; position: absolute; left: 50%; top: 50%; background: rgba(224,169,61,0.55);
    pointer-events: none; z-index: 1;
  }
  #pip::before { width: 1px; height: 22px; transform: translate(-50%,-50%); }
  #pip::after  { height: 1px; width: 22px; transform: translate(-50%,-50%); }

  #banner {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    padding: 9px 22px; font-size: 0.95rem; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  #banner b { color: var(--accent); }

  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.8); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 18px; font-size: 0.88rem; display: none; max-width: 80vw; text-align: center;
  }

  #endscreen {
    position: fixed; inset: 0; z-index: 15; display: none; align-items: center; justify-content: center;
    background: rgba(8,9,13,0.78); backdrop-filter: blur(4px);
  }
  #endscreen .card { text-align: center; }
  #endscreen h2 { font-size: 1.8rem; margin-bottom: 8px; }
  #endscreen p { color: var(--muted); margin-bottom: 20px; }

  #help {
    position: fixed; bottom: 14px; left: 14px; z-index: 10; color: var(--muted);
    font-size: 0.74rem; line-height: 1.6; display: none; max-width: 260px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
  }
  #help b { color: var(--text); }
  .copybtn { font-size: 0.8rem; padding: 12px 14px; }
</style>
</head>
<body>
<div id="app"></div>

<!-- Lobby -->
<div id="overlay">
  <div class="card">
    <h1>ZEN<span>GA</span></h1>
    <div class="tag">peer-to-peer multiplayer tower game</div>

    <div class="row"><input id="nameInput" placeholder="Your name" maxlength="14" /></div>

    <button id="hostBtn" style="width:100%">Host a new game</button>
    <button id="soloBtn" class="ghost" style="width:100%; margin-top:10px">Practice solo</button>

    <div class="share" id="shareBox">
      <label>Share this link with friends:</label>
      <div class="row" style="margin-top:6px">
        <input id="shareLink" readonly />
        <button id="copyBtn" class="copybtn">Copy</button>
      </div>
      <div class="hint">Waiting for players… you can start once everyone has joined.</div>
      <button id="startBtn" style="width:100%; margin-top:10px" disabled>Start game (need 2+ players)</button>
    </div>

    <div class="divider">OR</div>

    <div class="row">
      <input id="joinId" placeholder="Host code" />
      <button id="joinBtn" class="ghost">Join</button>
    </div>
    <div class="err" id="err"></div>
    <div class="hint">Built with Three.js · cannon-es · PeerJS. No server — your browsers talk directly.</div>
  </div>
</div>

<!-- HUD -->
<div id="hud"><div id="scoreboard"><h3>Players</h3><div id="players"></div></div></div>
<div id="pip"><div class="piplabel">TOP VIEW</div></div>
<div id="banner"></div>
<div id="toast"></div>
<div id="help"></div>

<!-- End screen -->
<div id="endscreen"><div class="card">
  <h2 id="endTitle">Tower down!</h2>
  <p id="endMsg"></p>
  <button id="againBtn" style="width:100%">Play again</button>
</div></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as CANNON from 'cannon-es';

/* ============================================================
   ZENGA — multiplayer physics Jenga
   Architecture: the HOST runs the authoritative cannon-es
   simulation. Clients connect over PeerJS, send their intents
   (select / drag / drop) and render the world state the host
   broadcasts. Host and client share one render path.
   ============================================================ */

// ---- Tower geometry constants ----
const L = 1.5, W = 0.5, H = 0.32;       // block length / width / height
const GAP = 0.03;                        // air slot between siblings in a layer
const LAYERS = 18, PER_LAYER = 3;
const N = LAYERS * PER_LAYER;            // 54 blocks
// collision groups: the block being pulled drops out of the BLOCK group so it
// can never push its neighbors — sliding it only removes its support.
const G_GROUND = 1, G_BLOCK = 2;
const COLORS = ['#e0533d','#3da0e0','#5fd06a','#e0c93d','#b46be0','#e07fb0','#4dd6c4','#f08a3c'];

// ---- Shared render buffer: positions[i]=[x,y,z], quats[i]=[x,y,z,w] ----
const render = {
  pos: Array.from({length:N}, ()=>[0,0,0]),
  quat: Array.from({length:N}, ()=>[0,0,0,1]),
};

// Per-block static metadata (orientation + home lane), identical on every peer.
const META = [];   // {axis:'x'|'z', along0, perp, y, color}
function buildMeta(){
  META.length = 0;
  for(let layer=0; layer<LAYERS; layer++){
    const alongX = layer % 2 === 0;       // even layers run along X
    const y = H/2 + layer*H;
    for(let k=0;k<PER_LAYER;k++){
      const off = (k-1) * (W + GAP);       // -1,0,1 -> lane offset
      META.push({
        axis: alongX ? 'x' : 'z',
        along0: 0,                          // home position along slide axis (centered)
        perp: off,                          // lane offset on the perpendicular axis
        y,
      });
    }
  }
}
buildMeta();

// =====================================================================
//  RENDERING (runs on everyone)
// =====================================================================
let renderer, scene, camera, controls, raycaster, pointer = new THREE.Vector2();
let pipRenderer, pipCam, pipEl;        // top-down placement view
const meshes = [];
let hoverMesh = null, placeGlow = null;

function initThree(){
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('app').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color('#15171f');
  scene.fog = new THREE.Fog('#15171f', 18, 38);

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(7, 6.5, 9);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 3, 0);
  controls.enableDamping = true;
  controls.minDistance = 5; controls.maxDistance = 22;
  controls.maxPolarAngle = Math.PI * 0.49;

  // lights
  const hemi = new THREE.HemisphereLight('#cdd6ff', '#202231', 0.7);
  scene.add(hemi);
  const key = new THREE.DirectionalLight('#fff4e0', 1.15);
  key.position.set(8, 14, 6); key.castShadow = true;
  key.shadow.mapSize.set(2048,2048);
  const d = 12; const c = key.shadow.camera;
  c.left=-d; c.right=d; c.top=d; c.bottom=-d; c.near=1; c.far=40;
  scene.add(key);
  scene.add(new THREE.DirectionalLight('#6f8cff', 0.25).translateX(-8).translateY(6).translateZ(-6));

  // table
  const table = new THREE.Mesh(
    new THREE.CylinderGeometry(9, 9, 0.6, 64),
    new THREE.MeshStandardMaterial({ color:'#2a2e3d', roughness:0.9, metalness:0.05 }));
  table.position.y = -0.3; table.receiveShadow = true;
  scene.add(table);

  // blocks — rendered slightly smaller than their physics cell so there's
  // visible air between every block while the simulation stays solid.
  const geo = new THREE.BoxGeometry(L*0.97, H*0.86, W*0.9);
  for(let i=0;i<N;i++){
    const hue = 38 + (i%5)*3;
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(`hsl(${hue}, 55%, ${52 - (i%3)*4}%)`),
      roughness: 0.75, metalness: 0.04,
    });
    const m = new THREE.Mesh(geo, mat);
    m.castShadow = m.receiveShadow = true;
    m.userData.index = i;
    scene.add(m);
    meshes.push(m);
  }

  // top-down picture-in-picture for accurate placement
  pipEl = document.getElementById('pip');
  pipRenderer = new THREE.WebGLRenderer({ antialias:true });
  pipRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  pipRenderer.setSize(210, 210);
  pipRenderer.shadowMap.enabled = false;
  pipEl.appendChild(pipRenderer.domElement);
  const s = 1.55;
  pipCam = new THREE.OrthographicCamera(-s, s, s, -s, 0.1, 90);
  pipCam.up.set(0, 0, -1);   // world +X = screen right, -Z = screen up

  raycaster = new THREE.Raycaster();
  addEventListener('resize', onResize);
  renderer.domElement.addEventListener('pointermove', onPointerMove);
  renderer.domElement.addEventListener('pointerdown', onPointerDown);
  renderer.domElement.addEventListener('pointerup', onPointerUp);
  animate();
}

function onResize(){
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

const _q = new THREE.Quaternion();
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  for(let i=0;i<N;i++){
    const p = render.pos[i], q = render.quat[i];
    meshes[i].position.set(p[0], p[1], p[2]);
    meshes[i].quaternion.set(q[0], q[1], q[2], q[3]);
  }
  updateHover();
  renderer.render(scene, camera);

  // highlight the block being carried so it's obvious from the top view
  if(placeGlow && !(G.phase==='placing' && placeGlow.userData.index===G.active)){
    placeGlow.material.emissive.setHex(0x000000); placeGlow = null;
  }
  // top-down placement view: only while placing
  if(G.phase === 'placing' && G.active >= 0){
    if(pipEl.style.display !== 'block') pipEl.style.display = 'block';
    placeGlow = meshes[G.active];
    placeGlow.material.emissive.setHex(0x4a6300);
    pipCam.position.set(0, G.topY + 14, 0);
    pipCam.lookAt(0, G.topY, 0);
    pipRenderer.render(scene, pipCam);
  } else if(pipEl.style.display !== 'none'){
    pipEl.style.display = 'none';
  }
}

// =====================================================================
//  INPUT (local player intents -> sent to host)
// =====================================================================
const dragPlane = new THREE.Plane();
const planePoint = new THREE.Vector3();
let isDown = false;

function setRay(e){
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
}

function myTurn(){ return G.players[G.turn] && G.players[G.turn].id === net.id; }

function updateHover(){
  // highlight a grabbable block on your turn
  if(hoverMesh){ hoverMesh.material.emissive.setHex(0x000000); hoverMesh = null; }
  if(!G.started || G.phase !== 'idle' || !myTurn()) return;
  raycaster.setFromCamera(pointer, camera);
  const hit = raycaster.intersectObjects(meshes, false)[0];
  if(hit){ hoverMesh = hit.object; hoverMesh.material.emissive.setHex(0x6b4a00); }
}

function onPointerMove(e){
  setRay(e);
  if(!myTurn() || !G.started) return;
  if(G.phase === 'pulling' && isDown && G.active >= 0){
    // project pointer onto a horizontal plane at the block height, send target
    const m = META[G.active];
    dragPlane.set(new THREE.Vector3(0,1,0), -render.pos[G.active][1]);
    if(raycaster.ray.intersectPlane(dragPlane, planePoint)){
      const along = m.axis === 'x' ? planePoint.x : planePoint.z;
      send({ t:'pull', i:G.active, along });
    }
  } else if(G.phase === 'placing' && G.active >= 0){
    const topY = G.topY + H*0.6;
    dragPlane.set(new THREE.Vector3(0,1,0), -topY);
    if(raycaster.ray.intersectPlane(dragPlane, planePoint)){
      send({ t:'place', x: clamp(planePoint.x,-1.2,1.2), z: clamp(planePoint.z,-1.2,1.2) });
    }
  }
}

function onPointerDown(e){
  isDown = true;
  if(!myTurn() || !G.started) return;
  if(G.phase === 'idle'){
    setRay(e);
    const hit = raycaster.intersectObjects(meshes, false)[0];
    if(hit){
      controls.enabled = false;
      send({ t:'select', i: hit.object.userData.index });
    }
  } else if(G.phase === 'placing'){
    send({ t:'drop' });
  }
}
function onPointerUp(){
  isDown = false;
  controls.enabled = true;
  if(myTurn() && G.phase === 'pulling') send({ t:'release' });
}

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

// =====================================================================
//  GAME STATE (mirrored on all peers; authoritative on host)
// =====================================================================
const G = {
  started: false,
  players: [],          // {id, name, color, score}
  turn: 0,
  phase: 'idle',        // idle | pulling | placing
  active: -1,           // block being manipulated
  topY: LAYERS*H,       // current placement height reference
  over: false,
};

// =====================================================================
//  PHYSICS (host only)
// =====================================================================
let world = null, bodies = [], origY = [];
let woodMat = null;
let dropTimer = 0, pullTarget = 0, collapseTime = 0;
const CLEAR = L*0.72;

// the resting orientation for a block in a given layer
function setBaseQuat(b, axis){
  if(axis === 'x') b.quaternion.set(0,0,0,1);
  else b.quaternion.setFromEuler(0, Math.PI/2, 0);
}
// fully solid block that collides with the tower again
function makeSolid(i){
  bodies[i].collisionFilterMask = G_GROUND | G_BLOCK;
}
// ghost block: tracked by the mouse, collides with nothing, pushes no one
function makeGhost(i){
  bodies[i].collisionFilterMask = 0;
}

function initPhysics(){
  world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
  world.solver.iterations = 45;
  world.solver.tolerance = 0.001;
  world.allowSleep = true;
  world.broadphase = new CANNON.SAPBroadphase(world);
  const mat = new CANNON.Material('wood');
  woodMat = mat;
  world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, {
    friction: 0.62, restitution: 0.0,
    contactEquationStiffness: 1e8, contactEquationRelaxation: 3,
    frictionEquationStiffness: 1e8,
  }));

  // ground
  const ground = new CANNON.Body({ mass:0, material:mat,
    shape:new CANNON.Plane(),
    collisionFilterGroup: G_GROUND, collisionFilterMask: G_BLOCK });
  ground.quaternion.setFromEuler(-Math.PI/2, 0, 0);
  world.addBody(ground);

  bodies = []; origY = []; collapseTime = 0;
  // single box shape (long axis on X, matching the render geometry);
  // odd layers are rotated 90° about Y so their long axis runs along Z.
  const half = new CANNON.Vec3(L/2, H/2, W/2);
  for(let i=0;i<N;i++){
    const m = META[i];
    const alongX = m.axis === 'x';
    const body = new CANNON.Body({ mass:6, material:mat, shape:new CANNON.Box(half),
      allowSleep:true, sleepSpeedLimit:0.22, sleepTimeLimit:0.2,
      linearDamping:0.5, angularDamping:0.6,
      collisionFilterGroup: G_BLOCK, collisionFilterMask: G_GROUND | G_BLOCK });
    if(!alongX) body.quaternion.setFromEuler(0, Math.PI/2, 0);
    const x = alongX ? m.along0 : m.perp;
    const z = alongX ? m.perp   : m.along0;
    body.position.set(x, m.y, z);
    world.addBody(body);
    bodies.push(body);
    origY.push(m.y);
  }
  syncRenderFromBodies();
}

function syncRenderFromBodies(){
  for(let i=0;i<N;i++){
    const b = bodies[i];
    render.pos[i][0]=b.position.x; render.pos[i][1]=b.position.y; render.pos[i][2]=b.position.z;
    render.quat[i][0]=b.quaternion.x; render.quat[i][1]=b.quaternion.y;
    render.quat[i][2]=b.quaternion.z; render.quat[i][3]=b.quaternion.w;
  }
}

function hostStep(dt){
  if(!world) return;
  // The pulled block is kinematic + collision-free: it tracks the mouse only
  // along its own axis, pinned to its lane and height, so it can never shove a
  // neighbor. Sliding it out simply removes the support it was giving.
  if(G.phase === 'pulling' && G.active >= 0){
    const b = bodies[G.active], i = G.active, m = META[i];
    const along = clamp(pullTarget, -L*1.5, L*1.5);
    const lane = m.perp, y = origY[i];
    if(m.axis === 'x') b.position.set(along, y, lane);
    else               b.position.set(lane, y, along);
    b.velocity.setZero(); b.angularVelocity.setZero();
    if(Math.abs(along) > CLEAR) beginPlace();     // block has cleared the tower
  }
  // carried block follows placement target (kinematic)
  if(G.phase === 'placing' && G.active >= 0){
    const b = bodies[G.active];
    b.position.lerp(carryTarget, 0.4, b.position);
    b.velocity.setZero(); b.angularVelocity.setZero();
  }

  world.step(1/60, dt, 4);
  syncRenderFromBodies();

  if(G.phase === 'settling'){
    dropTimer -= dt;
    if(dropTimer <= 0) finishTurn();
  }

  // forgiving collapse: the tower must stay collapsed for a moment, not
  // just wobble for a frame, before the round ends.
  if(checkCollapse()){
    collapseTime += dt;
    if(collapseTime > 0.5) endGame(G.players[G.turn]);
  } else {
    collapseTime = 0;
  }
}

const carryTarget = new CANNON.Vec3();

function beginPlace(){
  G.phase = 'placing';
  const b = bodies[G.active];
  b.velocity.setZero(); b.angularVelocity.setZero();   // already kinematic + ghost
  // recompute current top of tower for placement height
  let top = 0; for(let i=0;i<N;i++) if(i!==G.active) top = Math.max(top, bodies[i].position.y);
  G.topY = top + H/2;
  carryTarget.set(0, G.topY + H*0.6, 0);
  b.position.copy(carryTarget);
  setBaseQuat(b, META[G.active].axis);   // upright, aligned to its layer
  broadcastMeta();
}

function checkCollapse(){
  // only a move (pull or the drop settling) can lose the game
  if(G.over || !G.started) return false;
  if(G.phase !== 'pulling' && G.phase !== 'settling') return false;
  for(let i=0;i<N;i++){
    if(i === G.active) continue;
    if(bodies[i].position.y < origY[i] - H*1.4) return true;  // dropped more than a full layer
  }
  return false;
}

function finishTurn(){
  // mark the placed block's resting height so it isn't flagged as collapsed later
  origY[G.active] = bodies[G.active].position.y;
  G.players[G.turn].score++;
  G.active = -1;
  G.phase = 'idle';
  G.turn = (G.turn + 1) % G.players.length;
  broadcastMeta();
}

function endGame(loser){
  if(G.over) return;
  G.over = true; G.phase = 'idle'; G.active = -1;
  G.loser = loser ? loser.name : null;
  broadcastMeta();
}

// ---- host-side intent processing (from local player or a client) ----
function hostHandleIntent(msg, fromId){
  if(!G.started || G.over) return;
  const cur = G.players[G.turn];
  if(!cur || cur.id !== fromId) return;        // only the active player may act
  switch(msg.t){
    case 'select':
      if(G.phase==='idle' && msg.i>=0 && msg.i<N){
        const i = msg.i, b = bodies[i], m = META[i];
        G.phase='pulling'; G.active=i;
        b.type = CANNON.Body.KINEMATIC;       // mouse-controlled, not physics-pushed
        b.velocity.setZero(); b.angularVelocity.setZero();
        setBaseQuat(b, m.axis);
        makeGhost(i);                          // collides with nothing while pulled
        for(const o of bodies) o.wakeUp();     // so blocks react to the lost support
        pullTarget = m.axis==='x' ? b.position.x : b.position.z;
        broadcastMeta();
      }
      break;
    case 'pull':
      if(G.phase==='pulling' && msg.i===G.active) pullTarget = clamp(msg.along, -L*1.5, L*1.5);
      break;
    case 'release':
      if(G.phase==='pulling'){
        // put the block back exactly where it came from and re-solidify
        const i = G.active, b = bodies[i], m = META[i];
        const x = m.axis==='x' ? 0 : m.perp, z = m.axis==='x' ? m.perp : 0;
        b.position.set(x, origY[i], z);
        setBaseQuat(b, m.axis);
        b.velocity.setZero(); b.angularVelocity.setZero();
        b.type = CANNON.Body.DYNAMIC; makeSolid(i); b.wakeUp();
        G.phase='idle'; G.active=-1; broadcastMeta();
      }
      break;
    case 'place':
      if(G.phase==='placing') carryTarget.set(msg.x, G.topY + H*0.6, msg.z);
      break;
    case 'drop':
      if(G.phase==='placing'){
        const b = bodies[G.active];
        makeSolid(G.active);                   // collides with the tower again
        b.type = CANNON.Body.DYNAMIC; b.wakeUp();
        b.velocity.setZero(); b.angularVelocity.setZero();
        G.phase = 'settling'; dropTimer = 1.6;
        broadcastMeta();
      }
      break;
  }
}

// =====================================================================
//  NETWORKING (PeerJS)
// =====================================================================
const net = { peer:null, id:null, isHost:false, conns:[] /* host: client conns */, host:null /* client: conn */ };

function send(msg){
  // route a local intent to the host
  if(net.isHost){ hostHandleIntent(msg, net.id); }
  else if(net.host && net.host.open){ net.host.send(msg); }
}

// host -> broadcast lightweight meta (turn/phase/scores/players)
function broadcastMeta(){
  const meta = packMeta();
  for(const c of net.conns) if(c.open) c.send(meta);
  applyMeta(meta);   // host applies to its own G/UI
}
function packMeta(){
  return { t:'meta', started:G.started, players:G.players, turn:G.turn,
    phase:G.phase, active:G.active, topY:G.topY, over:G.over, loser:G.loser||null };
}
function applyMeta(m){
  G.started=m.started; G.players=m.players; G.turn=m.turn; G.phase=m.phase;
  G.active=m.active; G.topY=m.topY; G.over=m.over; G.loser=m.loser;
  updateUI();
  if(G.over) showEnd();
}

// host -> broadcast physics transforms (~30Hz)
function packState(){
  const a = new Array(N*7);
  for(let i=0;i<N;i++){
    const p=render.pos[i], q=render.quat[i], o=i*7;
    a[o]=r3(p[0]); a[o+1]=r3(p[1]); a[o+2]=r3(p[2]);
    a[o+3]=r3(q[0]); a[o+4]=r3(q[1]); a[o+5]=r3(q[2]); a[o+6]=r3(q[3]);
  }
  return { t:'state', a };
}
function r3(x){ return Math.round(x*1000)/1000; }
function applyState(m){
  const a=m.a;
  for(let i=0;i<N;i++){
    const o=i*7;
    render.pos[i][0]=a[o]; render.pos[i][1]=a[o+1]; render.pos[i][2]=a[o+2];
    render.quat[i][0]=a[o+3]; render.quat[i][1]=a[o+4]; render.quat[i][2]=a[o+5]; render.quat[i][3]=a[o+6];
  }
}

function newPeer(customId){
  return new Promise((resolve, reject)=>{
    const p = customId ? new Peer(customId) : new Peer();
    p.on('open', id => resolve({p, id}));
    p.on('error', err => reject(err));
  });
}

// ---- HOST ----
async function startHosting(name){
  net.isHost = true;
  const code = 'zenga-' + Math.random().toString(36).slice(2,8);
  let res;
  try { res = await newPeer(code); }
  catch(e){ res = await newPeer(); }      // fall back to random id on collision
  net.peer = res.p; net.id = res.id;

  G.players = [{ id: net.id, name: name, color: COLORS[0], score: 0 }];

  net.peer.on('connection', conn => {
    conn.on('open', ()=>{
      net.conns.push(conn);
      // tell the newcomer it's connected; they will send a join with their name
      conn.send({ t:'hello' });
    });
    conn.on('data', d => onHostData(conn, d));
    conn.on('close', ()=> removePlayer(conn.peer));
  });

  initPhysics();
  startStateLoop();
  showShare(res.id);
  updateUI();
}

function onHostData(conn, d){
  if(d.t === 'join'){
    if(G.players.find(p=>p.id===conn.peer)) return;
    const color = COLORS[G.players.length % COLORS.length];
    G.players.push({ id: conn.peer, name: (d.name||'Player').slice(0,14), color, score:0 });
    document.getElementById('startBtn').disabled = G.players.length < 2;
    broadcastMeta();
  } else {
    hostHandleIntent(d, conn.peer);
  }
}

function removePlayer(id){
  net.conns = net.conns.filter(c=>c.peer!==id);
  const idx = G.players.findIndex(p=>p.id===id);
  if(idx<0) return;
  const wasTurn = idx === G.turn;
  G.players.splice(idx,1);
  if(G.players.length===0) return;
  if(G.turn >= G.players.length) G.turn = 0;
  if(wasTurn && (G.phase!=='idle')){ G.phase='idle'; G.active=-1; }
  broadcastMeta();
}

let stateInterval = null;
function startStateLoop(){
  let last = performance.now();
  function loop(now){
    const dt = Math.min((now-last)/1000, 0.05); last = now;
    hostStep(dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  // broadcast transforms at 30Hz
  stateInterval = setInterval(()=>{
    if(net.conns.length){ const s = packState(); for(const c of net.conns) if(c.open) c.send(s); }
  }, 33);
}

function hostStartGame(){
  if(G.players.length < 2) return;
  G.started = true; G.over=false; G.loser=null; G.turn=0; G.phase='idle';
  initPhysics();
  broadcastMeta();
  enterGame();
}

function hostReset(){
  G.over=false; G.loser=null; G.turn=0; G.phase='idle'; G.active=-1;
  for(const p of G.players) p.score=0;
  initPhysics();
  broadcastMeta();
  document.getElementById('endscreen').style.display='none';
}

// ---- CLIENT ----
async function joinGame(name, hostId){
  net.isHost = false;
  const res = await newPeer();
  net.peer = res.p; net.id = res.id;
  const conn = net.peer.connect(hostId, { reliable:true });
  net.host = conn;
  return new Promise((resolve, reject)=>{
    const timer = setTimeout(()=>reject(new Error('Could not reach host. Check the code.')), 9000);
    conn.on('open', ()=>{ conn.send({ t:'join', name }); });
    conn.on('data', d=>{
      if(d.t==='hello'){ clearTimeout(timer); resolve(); }
      else if(d.t==='meta'){ const wasStarted=G.started; applyMeta(d); if(!wasStarted && G.started) enterGame(); }
      else if(d.t==='state'){ applyState(d); }
    });
    conn.on('close', ()=> toast('Disconnected from host.'));
    conn.on('error', err=>{ clearTimeout(timer); reject(err); });
  });
}

// =====================================================================
//  UI
// =====================================================================
const el = id => document.getElementById(id);

function showShare(id){
  el('hostBtn').disabled = true;
  el('shareBox').style.display = 'block';
  const url = location.origin + location.pathname + '?host=' + encodeURIComponent(id);
  el('shareLink').value = url;
  el('joinId').value = id;   // also surface the raw code
}

function enterGame(){
  el('overlay').style.display='none';
  el('hud').style.display='block';
  el('banner').style.display='block';
  el('help').style.display='block';
  el('help').innerHTML = '<b>On your turn:</b><br>• Drag a block to slide it out<br>• Once it pops free, move it on top<br>• Click to drop it<br>Drag empty space to orbit the camera.';
  updateUI();
}

function updateUI(){
  // scoreboard
  const wrap = el('players'); if(!wrap) return;
  wrap.innerHTML = '';
  G.players.forEach((p,i)=>{
    const row = document.createElement('div');
    row.className = 'pl' + (i===G.turn && G.started ? ' turn':'');
    row.innerHTML = `<span class="dot" style="background:${p.color}"></span>
      <span class="nm">${escapeHtml(p.name)}${p.id===net.id?' (you)':''}</span>
      <span class="sc">${p.score}</span>`;
    wrap.appendChild(row);
  });
  // banner
  if(G.started && !G.over){
    const cur = G.players[G.turn];
    const b = el('banner');
    if(cur){
      b.innerHTML = cur.id===net.id
        ? (G.phase==='placing' ? 'Place the block on top — <b>click to drop</b>'
           : G.phase==='pulling' ? '<b>Slide it out…</b>'
           : "<b>Your turn</b> — drag a block to remove")
        : `Waiting for <b>${escapeHtml(cur.name)}</b>…`;
    }
  }
}

function showEnd(){
  const es = el('endscreen');
  el('endTitle').textContent = '🧱 Tower down!';
  el('endMsg').textContent = G.loser ? `${G.loser} toppled the tower.` : 'The tower collapsed.';
  el('againBtn').style.display = net.isHost ? 'block' : 'none';
  es.style.display = 'flex';
}

let toastTimer;
function toast(msg){
  const t = el('toast'); t.textContent = msg; t.style.display='block';
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.style.display='none', 3000);
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// =====================================================================
//  WIRE UP LOBBY
// =====================================================================
initThree();

const params = new URLSearchParams(location.search);
const presetHost = params.get('host');
if(presetHost){ el('joinId').value = presetHost; }

function getName(){ return (el('nameInput').value.trim() || 'Player').slice(0,14); }

el('hostBtn').onclick = async ()=>{
  el('err').textContent='';
  try { await startHosting(getName()); }
  catch(e){ el('err').textContent = 'Could not start host: ' + (e.message||e); el('hostBtn').disabled=false; }
};

el('startBtn').onclick = ()=> hostStartGame();

el('soloBtn').onclick = ()=>{
  // local practice: no networking, always your turn
  net.isHost = true; net.id = 'solo';
  G.players = [{ id:'solo', name: getName(), color: COLORS[0], score: 0 }];
  G.started = true; G.over = false; G.loser = null; G.turn = 0; G.phase = 'idle';
  initPhysics();
  startStateLoop();
  enterGame();
  updateUI();
};

el('joinBtn').onclick = async ()=>{
  const id = el('joinId').value.trim();
  if(!id){ el('err').textContent='Enter a host code.'; return; }
  el('err').textContent='Connecting…'; el('joinBtn').disabled=true;
  try {
    await joinGame(getName(), id);
    el('err').textContent='Connected! Waiting for the host to start…';
    el('joinId').disabled = el('hostBtn').disabled = true;
  } catch(e){
    el('err').textContent = e.message || 'Connection failed.';
    el('joinBtn').disabled=false;
  }
};

el('copyBtn').onclick = ()=>{
  el('shareLink').select();
  navigator.clipboard?.writeText(el('shareLink').value);
  el('copyBtn').textContent='Copied!';
  setTimeout(()=>el('copyBtn').textContent='Copy', 1500);
};

el('againBtn').onclick = ()=>{ if(net.isHost) hostReset(); };
</script>
